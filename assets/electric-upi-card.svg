<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" fill="none">
  <defs>
    <linearGradient id="bg-eupi" x1="0" y1="0" x2="520" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#0c4a6e"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="bolt-eupi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow-eupi" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="320" rx="16" fill="url(#bg-eupi)"/>

  <!-- Decorative grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="64" x2="520" y2="64"/>
    <line x1="0" y1="128" x2="520" y2="128"/>
    <line x1="0" y1="192" x2="520" y2="192"/>
    <line x1="0" y1="256" x2="520" y2="256"/>
    <line x1="104" y1="0" x2="104" y2="320"/>
    <line x1="208" y1="0" x2="208" y2="320"/>
    <line x1="312" y1="0" x2="312" y2="320"/>
    <line x1="416" y1="0" x2="416" y2="320"/>
  </g>

  <!-- Lightning bolt icon -->
  <g transform="translate(28,28)" filter="url(#glow-eupi)">
    <path d="M22 4 L8 26 H18 L14 46 L34 20 H22 L26 4 Z" fill="url(#bolt-eupi)" stroke="#67e8f9" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="72" y="52" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#f8fafc">⚡ Electric UPI</text>

  <!-- Tagline -->
  <text x="28" y="92" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="15" fill="#e2e8f0">Peer-to-Peer EV Charging for India</text>

  <!-- Stat chip: 39,641 stations -->
  <g transform="translate(28,112)">
    <rect width="290" height="30" rx="15" fill="#06b6d4" fill-opacity="0.18" stroke="#22d3ee" stroke-width="1"/>
    <circle cx="16" cy="15" r="5" fill="#22d3ee"/>
    <text x="30" y="20" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="13" font-weight="600" fill="#cffafe">39,641 govt charging stations indexed</text>
  </g>

  <!-- Mini badges row -->
  <g font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">
    <!-- Next.js 16 -->
    <g transform="translate(28,160)">
      <rect width="92" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <circle cx="14" cy="13" r="5" fill="#ffffff"/>
      <text x="26" y="17" fill="#e2e8f0">Next.js 16</text>
    </g>
    <!-- Supabase + PostGIS -->
    <g transform="translate(128,160)">
      <rect width="130" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <circle cx="14" cy="13" r="5" fill="#3ecf8e"/>
      <text x="26" y="17" fill="#e2e8f0">Supabase + PostGIS</text>
    </g>
    <!-- MapLibre -->
    <g transform="translate(266,160)">
      <rect width="86" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <circle cx="14" cy="13" r="5" fill="#95d13c"/>
      <text x="26" y="17" fill="#e2e8f0">MapLibre</text>
    </g>
  </g>

  <!-- Second row badges -->
  <g font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="11" font-weight="600">
    <!-- OTP Handshake -->
    <g transform="translate(28,196)">
      <rect width="120" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <circle cx="14" cy="13" r="5" fill="#fbbf24"/>
      <text x="26" y="17" fill="#e2e8f0">OTP Handshake</text>
    </g>
    <!-- Zero-Hardware Billing -->
    <g transform="translate(156,196)">
      <rect width="150" height="26" rx="13" fill="#1e293b" stroke="#334155" stroke-width="1"/>
      <circle cx="14" cy="13" r="5" fill="#f472b6"/>
      <text x="26" y="17" fill="#e2e8f0">Zero-Hardware Billing</text>
    </g>
  </g>

  <!-- Live MVP badge -->
  <g transform="translate(28,244)">
    <rect width="120" height="32" rx="16" fill="#16a34a" stroke="#22c55e" stroke-width="1"/>
    <circle cx="18" cy="16" r="6" fill="#4ade80"/>
    <circle cx="18" cy="16" r="3" fill="#16a34a"/>
    <text x="32" y="21" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f0fdf4">● MVP LIVE</text>
  </g>

  <!-- Repo link hint -->
  <text x="28" y="298" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="11" fill="#94a3b8">github.com/manikng/Electric-upi · electric-upi-nine.vercel.app</text>

  <!-- Corner accent -->
  <path d="M520 0 L520 80 L440 0 Z" fill="#ffffff" fill-opacity="0.05"/>
  <path d="M520 320 L440 320 L520 240 Z" fill="#06b6d4" fill-opacity="0.12"/>
</svg>